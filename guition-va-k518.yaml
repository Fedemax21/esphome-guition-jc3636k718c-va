# =============================================================================
# Voice Knob - YOUR config for the Guition JC3636K518 (K5 knob).  [ALPHA / UNVERIFIED]
# -----------------------------------------------------------------------------
# Same as guition-va.yaml but pulls the K518 hardware core (base/core-k518.yaml) from
# the k518-alpha branch. Pins come from the K518 schematic; audio (CH445P I2S switch on
# GPIO0) and the knob direction are NOT verified on real hardware yet. The K518 has no
# LED ring, so all ring features are absent. See docs/k518/HARDWARE-K518.md.
#
#   esphome run guition-va-k518.yaml
# =============================================================================

substitutions:
  name: voice-knob-k518
  friendly_name: "Voice Knob K518"
  timezone: "Europe/Warsaw"   # IANA name; core maps common zones to POSIX. DST automatic.
  ha_base_url: "http://homeassistant.local:8123"
  player_entity: media_player.voice_knob_k518_player
  wake_word: "alexa"
  weather_entity: weather.home
  room_temp_entity: sensor.room_temperature
  room_hum_entity: sensor.room_humidity
  forecast_entity: sensor.va_weekly_forecast
  climate_entity: climate.living_room

  tile1_entity: light.living_room
  tile1_icon: "bulb"
  tile1_name: "Light"
  tile2_entity: switch.desk_neon
  tile2_icon: "flash"
  tile2_name: "Neon"
  tile3_entity: light.led_strip
  tile3_icon: "led"
  tile3_name: "LED strip"
  tile4_entity: switch.power_socket
  tile4_icon: "power"
  tile4_name: "Socket"

  glance1_entity: sensor.power
  glance1_name: "Power"
  glance1_icon: "flash"
  glance2_entity: sensor.va_glance_unused2
  glance2_name: ""
  glance2_icon: ""
  glance3_entity: sensor.va_glance_unused3
  glance3_name: ""
  glance3_icon: ""
  glance4_entity: sensor.va_glance_unused4
  glance4_name: ""
  glance4_icon: ""
  glance5_entity: sensor.va_glance_unused5
  glance5_name: ""
  glance5_icon: ""
  glance6_entity: sensor.va_glance_unused6
  glance6_name: ""
  glance6_icon: ""

  screen_order: "clock,player,timer,cars,space,snake,knobuss,weather,thermostat,sensors"

packages:
  core:
    url: https://github.com/MichalZaniewicz/esphome-guition-jc3636k718c-va
    ref: k518-alpha          # the K518 port branch
    files:
      - base/core-k518.yaml  # K518 hardware core (NOT base/core.yaml)
      - base/screens/player.yaml
      - base/screens/timer.yaml
      - base/screens/cool-cars.yaml
      - base/screens/space-wars.yaml
      - base/screens/snake.yaml
      - base/screens/knobuss.yaml
      - base/screens/weather.yaml
      - base/screens/thermostat.yaml
      - base/screens/sensors.yaml
      # - base/screens/demo.yaml   # DISABLED on K518: this screen drives the LED ring (ring_light),
      #                            # which does not exist on this board. Re-enable only after the ring
      #                            # references in demo.yaml are made conditional. See docs/k518/HARDWARE-K518.md.
      - base/watchfaces/neon.yaml
      - base/watchfaces/minecraft.yaml
    refresh: 0s

# Keep a secrets.yaml and partitions.csv next to this file (both must be local paths).
